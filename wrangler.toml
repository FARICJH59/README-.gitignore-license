name = "axiomcore-cloudflare"
main = "backend/workers/mainWorker.ts"
compatibility_date = "2024-09-10"
workers_dev = true

[ai]
binding = "AI"

[[kv_namespaces]]
binding = "KV_STATE"
id = "axiomcore-kv"

[[r2_buckets]]
binding = "R2_BUCKET"
bucket_name = "axiomcore-content"

[[vectorize]]
binding = "VECTORIZE"
index_name = "axiomcore-index"

[workflows]
binding = "WORKFLOWS"

[[durable_objects.bindings]]
name = "AXIOM_DO"
class_name = "AxiomDurableObject"

[observability]
enabled = true

[dev]
ip = "0.0.0.0"
port = 8787
local_protocol = "http"
