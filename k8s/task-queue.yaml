apiVersion: v1
kind: ServiceAccount
metadata:
  name: task-queue-sa
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: task-queue
  labels:
    app: task-queue
spec:
  replicas: 3
  selector:
    matchLabels:
      app: task-queue
  template:
    metadata:
      labels:
        app: task-queue
    spec:
      serviceAccountName: task-queue-sa
      containers:
        - name: nats
          image: nats:2.10-alpine
          args: ["-js"]
          ports:
            - containerPort: 4222
            - containerPort: 8222
          livenessProbe:
            tcpSocket:
              port: 4222
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 4222
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: task-queue
spec:
  selector:
    app: task-queue
  ports:
    - name: client
      port: 4222
      targetPort: 4222
    - name: monitoring
      port: 8222
      targetPort: 8222
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: task-queue-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: task-queue
  minReplicas: 3
  maxReplicas: 10
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Pods
      pods:
        metric:
          name: queue_length
        target:
          type: AverageValue
          averageValue: 100
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: task-queue-netpol
spec:
  podSelector:
    matchLabels:
      app: task-queue
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: worker-node
        - podSelector:
            matchLabels:
              app: brain-node
        - podSelector:
            matchLabels:
              app: gpu-node
      ports:
        - protocol: TCP
          port: 4222
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: telemetry-agent
      ports:
        - protocol: TCP
          port: 4317
