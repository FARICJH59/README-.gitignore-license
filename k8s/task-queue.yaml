apiVersion: apps/v1
kind: Deployment
metadata:
  name: task-queue
  labels:
    app: axiomcore
    tier: queue
spec:
  replicas: 3
  selector:
    matchLabels:
      app: axiomcore
      tier: queue
  template:
    metadata:
      labels:
        app: axiomcore
        tier: queue
    spec:
      containers:
        - name: nats
          image: nats:2.10-alpine
          ports:
            - containerPort: 4222
            - containerPort: 8222
---
apiVersion: v1
kind: Service
metadata:
  name: task-queue
spec:
  selector:
    app: axiomcore
    tier: queue
  ports:
    - name: client
      port: 4222
      targetPort: 4222
