apiVersion: apps/v1
kind: Deployment
metadata:
  name: gpu-llm
  labels: { app: axiomcore, tier: gpu, role: llm }
spec:
  replicas: 100
  selector:
    matchLabels: { app: axiomcore, tier: gpu, role: llm }
  template:
    metadata:
      labels: { app: axiomcore, tier: gpu, role: llm }
    spec:
      containers:
        - name: gpu-llm
          image: ghcr.io/example/axiomcore-gpu-llm:latest
          resources:
            requests: { cpu: "1", memory: "4Gi", "nvidia.com/gpu": 1 }
            limits: { cpu: "2", memory: "8Gi", "nvidia.com/gpu": 1 }
---
