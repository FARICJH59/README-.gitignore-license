apiVersion: v1
kind: ServiceAccount
metadata:
  name: gpu-cluster-sa
  namespace: default
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: gpu-scheduling-hints
data:
  routing.json: |
    {
      "llm": "llm-cluster",
      "vision": "vision-cluster",
      "ml": "ml-cluster",
      "embedding": "embedding-cluster"
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: llm-gpu-cluster
  labels:
    app: gpu-node
    tier: llm
spec:
  replicas: 100
  selector:
    matchLabels:
      app: gpu-node
      tier: llm
  template:
    metadata:
      labels:
        app: gpu-node
        tier: llm
    spec:
      serviceAccountName: gpu-cluster-sa
      nodeSelector:
        accelerator: nvidia
      containers:
        - name: llm-gpu
          image: axiomcore/gpu-llm:latest
          resources:
            limits:
              nvidia.com/gpu: 1
              cpu: "4000m"
              memory: "16Gi"
            requests:
              cpu: "2000m"
              memory: "8Gi"
          env:
            - name: CLUSTER_ROLE
              value: "gpu-llm"
          ports:
            - containerPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vision-gpu-cluster
  labels:
    app: gpu-node
    tier: vision
spec:
  replicas: 50
  selector:
    matchLabels:
      app: gpu-node
      tier: vision
  template:
    metadata:
      labels:
        app: gpu-node
        tier: vision
    spec:
      serviceAccountName: gpu-cluster-sa
      nodeSelector:
        accelerator: nvidia
      containers:
        - name: vision-gpu
          image: axiomcore/gpu-vision:latest
          resources:
            limits:
              nvidia.com/gpu: 1
              cpu: "2000m"
              memory: "8Gi"
            requests:
              cpu: "1000m"
              memory: "4Gi"
          env:
            - name: CLUSTER_ROLE
              value: "gpu-vision"
          ports:
            - containerPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ml-gpu-cluster
  labels:
    app: gpu-node
    tier: ml
spec:
  replicas: 50
  selector:
    matchLabels:
      app: gpu-node
      tier: ml
  template:
    metadata:
      labels:
        app: gpu-node
        tier: ml
    spec:
      serviceAccountName: gpu-cluster-sa
      nodeSelector:
        accelerator: nvidia
      containers:
        - name: ml-gpu
          image: axiomcore/gpu-ml:latest
          resources:
            limits:
              nvidia.com/gpu: 1
              cpu: "2000m"
              memory: "8Gi"
            requests:
              cpu: "1000m"
              memory: "4Gi"
          env:
            - name: CLUSTER_ROLE
              value: "gpu-ml"
          ports:
            - containerPort: 8080
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: embedding-gpu-cluster
  labels:
    app: gpu-node
    tier: embedding
spec:
  replicas: 50
  selector:
    matchLabels:
      app: gpu-node
      tier: embedding
  template:
    metadata:
      labels:
        app: gpu-node
        tier: embedding
    spec:
      serviceAccountName: gpu-cluster-sa
      nodeSelector:
        accelerator: nvidia
      containers:
        - name: embedding-gpu
          image: axiomcore/gpu-embedding:latest
          resources:
            limits:
              nvidia.com/gpu: 1
              cpu: "1000m"
              memory: "4Gi"
            requests:
              cpu: "500m"
              memory: "2Gi"
          env:
            - name: CLUSTER_ROLE
              value: "gpu-embedding"
          ports:
            - containerPort: 8080
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: llm-gpu-hpa
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: llm-gpu-cluster
  minReplicas: 50
  maxReplicas: 120
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: gpu-cluster-netpol
spec:
  podSelector:
    matchLabels:
      app: gpu-node
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: worker-node
        - podSelector:
            matchLabels:
              app: brain-node
      ports:
        - protocol: TCP
          port: 8080
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: task-queue
      ports:
        - protocol: TCP
          port: 4222
