name: Security, Coverage, and AI Monitoring

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  coverage-enforcement:
    name: Coverage Enforcement (>=80%)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest pytest-cov
      - name: Run backend tests with coverage
        run: pytest backend/tests --cov=backend.main --cov-report=xml --cov-report=term
      - name: Enforce 80% coverage threshold
        run: python scripts/coverage_gate.py --coverage-file coverage.xml --threshold 80 --require-data
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: coverage.xml
          if-no-files-found: error

  security-scans:
    name: Security Scans (Python, JS, Docker)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Python dependency audit
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit
          pip-audit -r requirements.txt --progress-spinner off --format json --output pip-audit.json || true
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: npm audit (high/critical)
        working-directory: frontend
        run: |
          npm ci
          npm audit --omit=dev --audit-level=high --json > ../npm-audit.json || true
      - name: Trivy repository scan (fs)
        uses: aquasecurity/trivy-action@0.24.0
        with:
          scan-type: "fs"
          scan-ref: .
          severity: "HIGH,CRITICAL"
          exit-code: "0"
          format: "sarif"
          output: "trivy-results.sarif"
      - name: Upload security artifacts
        uses: actions/upload-artifact@v4
        with:
          name: security-reports
          path: |
            pip-audit.json
            npm-audit.json
            trivy-results.sarif
          if-no-files-found: warn

  ai-monitoring:
    name: AI/ML Workflow Monitoring
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Generate AI workflow report
        run: python scripts/ai_workflow_report.py --output docs/AI-WORKFLOW-REPORT.md
      - name: Upload AI workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ai-workflow-report
          path: docs/AI-WORKFLOW-REPORT.md
          if-no-files-found: error
